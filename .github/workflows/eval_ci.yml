name: AgriBot Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/eval

      - name: Start Qdrant
        run: |
          docker run -d -p 6333:6333 \
            --name agribot-qdrant qdrant/qdrant
          sleep 8

      - name: Build vector store from sample chunks (CI mode)
        run: |
          python3 -c "
          import json
          from src.ingestion.embedder import embed_texts
          from src.retrieval.vector_store import create_collection, upsert_chunks
          from src.retrieval.bm25_store import build_bm25_index

          print('Loading chunks...')
          with open('data/processed/chunks.json') as f:
              all_chunks = json.load(f)

          # Use every 5th chunk — 20% sample, still representative
          chunks = all_chunks[::5]
          print(f'Using {len(chunks)} sampled chunks (from {len(all_chunks)} total)')

          print('Embedding...')
          texts = [c['content'] for c in chunks]
          embeddings = embed_texts(texts, batch_size=64)

          print('Storing in Qdrant...')
          create_collection(recreate=True)
          upsert_chunks(chunks, embeddings)

          print('Building BM25 on full corpus...')
          build_bm25_index(all_chunks)
          print('Done!')
          "
        env:
          QDRANT_URL: http://localhost:6333
          LLM_MODEL: llama-3.3-70b-versatile

      - name: Run evaluation (CI mode)
        run: python3 -m eval.run_eval --threshold 0.40
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_URL: http://localhost:6333
          LLM_MODEL: llama-3.3-70b-versatile

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: data/eval/eval_report.json