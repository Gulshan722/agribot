name: AgriBot Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/eval

      - name: Start Qdrant
        run: |
          docker run -d -p 6333:6333 \
            --name agribot-qdrant qdrant/qdrant
          sleep 8

      - name: Restore processed chunks from repo
        run: |
          echo "Using pre-processed chunks from repository..."
          ls -lh data/processed/ || echo "No processed data found"

      - name: Rebuild vector store and BM25 from committed chunks
        run: |
          python3 -c "
          import json
          from src.ingestion.embedder import embed_texts
          from src.retrieval.vector_store import create_collection, upsert_chunks
          from src.retrieval.bm25_store import build_bm25_index

          print('Loading committed chunks...')
          with open('data/processed/chunks.json') as f:
              chunks = json.load(f)
          print(f'Loaded {len(chunks)} chunks')

          print('Embedding chunks...')
          texts = [c['content'] for c in chunks]
          embeddings = embed_texts(texts, batch_size=64)

          print('Storing in Qdrant...')
          create_collection(recreate=True)
          upsert_chunks(chunks, embeddings)

          print('Building BM25...')
          build_bm25_index(chunks)
          print('Done!')
          "
        env:
          QDRANT_URL: http://localhost:6333

      - name: Run evaluation against golden dataset
        run: python3 -m eval.run_eval --threshold 0.45
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_URL: http://localhost:6333

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: data/eval/eval_report.json